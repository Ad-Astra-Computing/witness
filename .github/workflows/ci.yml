name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly node-24-compat probe; the per-PR canonical job is nix-checks.
    - cron: "37 6 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install npm deps
        run: nix develop --command npm ci

      - name: Tests
        run: nix develop --command npm test

      - name: Typecheck
        run: nix develop --command npm run typecheck

  # Backward-compat probe: runs weekly (not per-PR) since the canonical
  # supported runtime is Node 24 via the Nix shell. Keeps a check that
  # Node 22 still passes for contributors who haven't bumped yet.
  node-22-compat:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
